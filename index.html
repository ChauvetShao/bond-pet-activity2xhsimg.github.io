<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOND 内容运营工具箱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Serif+SC:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:   #FFFCEB;
      --bond:    #42AADF;
      --bond-dk: #2889be;
      --ink:     #1a1208;
      --muted:   #8a7f6a;
      --warm:    #F5E6C8;
      --coral:   #F2845C;
      --mint:    #A8D8C0;
      --card-r:  20px;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', 'Noto Serif SC', sans-serif;
      overflow-x: hidden;
    }

    /* ── noise texture overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 180px;
      opacity: 0.5;
    }

    /* ── decorative blobs ── */
    .blob {
      position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0;
    }
    .blob-1 {
      width: 480px; height: 480px;
      background: rgba(66,170,223,0.13);
      top: -120px; right: -100px;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob-2 {
      width: 320px; height: 320px;
      background: rgba(242,132,92,0.1);
      bottom: 60px; left: -80px;
      animation: drift 15s ease-in-out infinite alternate-reverse;
    }
    .blob-3 {
      width: 240px; height: 240px;
      background: rgba(168,216,192,0.12);
      top: 50%; left: 55%;
      animation: drift 18s ease-in-out infinite alternate;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.06); }
    }

    /* ── layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 24px;
      gap: 0;
    }

    /* ── header ── */
    .header {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeUp 0.7s ease both;
    }

    .brand-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: white;
      border: 1.5px solid rgba(66,170,223,0.3);
      border-radius: 100px;
      padding: 6px 16px 6px 10px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(66,170,223,0.1);
    }
    .brand-badge .paw {
      font-size: 18px;
      animation: waggle 2.4s ease-in-out infinite;
    }
    @keyframes waggle {
      0%,100% { transform: rotate(-8deg); }
      50%      { transform: rotate(8deg); }
    }
    .brand-badge span {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      color: var(--bond);
      letter-spacing: 0.06em; text-transform: uppercase;
    }

    .main-title {
      font-family: 'Playfair Display', 'Noto Serif SC', serif;
      font-size: clamp(36px, 6vw, 58px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 14px;
    }
    .main-title em {
      font-style: normal;
      color: var(--bond);
      position: relative;
    }
    .main-title em::after {
      content: '';
      position: absolute;
      left: 0; bottom: -2px;
      width: 100%; height: 3px;
      background: var(--coral);
      border-radius: 2px;
      transform: scaleX(0);
      transform-origin: left;
      animation: underlineIn 0.6s 0.8s ease forwards;
    }
    @keyframes underlineIn { to { transform: scaleX(1); } }

    .subtitle {
      font-size: 15px; color: var(--muted);
      font-weight: 300; letter-spacing: 0.01em;
      line-height: 1.6;
    }

    /* ── tool cards ── */
    .cards {
      display: flex; gap: 24px; flex-wrap: wrap;
      justify-content: center;
      width: 100%; max-width: 820px;
    }

    .card {
      flex: 1 1 340px; max-width: 380px;
      background: white;
      border-radius: var(--card-r);
      border: 1.5px solid rgba(26,18,8,0.07);
      padding: 36px 32px 32px;
      cursor: pointer;
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column; gap: 20px;
      position: relative; overflow: hidden;
      box-shadow: 0 4px 24px rgba(26,18,8,0.05), 0 1px 3px rgba(26,18,8,0.04);
      transition: transform 0.28s cubic-bezier(.34,1.56,.64,1),
                  box-shadow 0.28s ease,
                  border-color 0.2s ease;
      animation: fadeUp 0.7s ease both;
    }
    .card:nth-child(2) { animation-delay: 0.12s; }

    .card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(66,170,223,0.04) 100%);
      opacity: 0; transition: opacity 0.3s;
    }
    .card:hover { transform: translateY(-6px); border-color: rgba(66,170,223,0.35); }
    .card:hover { box-shadow: 0 16px 48px rgba(66,170,223,0.14), 0 4px 12px rgba(26,18,8,0.06); }
    .card:hover::before { opacity: 1; }

    /* accent strip top */
    .card-strip {
      position: absolute; top: 0; left: 0; right: 0; height: 4px;
      border-radius: var(--card-r) var(--card-r) 0 0;
    }
    .card-1 .card-strip { background: linear-gradient(90deg, var(--bond), var(--mint)); }
    .card-2 .card-strip { background: linear-gradient(90deg, var(--coral), #f5c26b); }

    .card-icon {
      width: 56px; height: 56px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }
    .card-1 .card-icon { background: rgba(66,170,223,0.1); }
    .card-2 .card-icon { background: rgba(242,132,92,0.1); }

    .card-body { flex: 1; }

    .card-tag {
      display: inline-block;
      font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      margin-bottom: 10px;
    }
    .card-1 .card-tag { background: rgba(66,170,223,0.1); color: var(--bond-dk); }
    .card-2 .card-tag { background: rgba(242,132,92,0.1); color: #c05c35; }

    .card-title {
      font-family: 'Playfair Display', 'Noto Serif SC', serif;
      font-size: 22px; font-weight: 700;
      line-height: 1.2; margin-bottom: 8px;
      color: var(--ink);
    }

    .card-desc {
      font-size: 13.5px; color: var(--muted);
      line-height: 1.65; font-weight: 300;
    }

    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 16px;
      border-top: 1px solid rgba(26,18,8,0.06);
    }

    .card-meta {
      font-size: 12px; color: var(--muted);
      display: flex; align-items: center; gap: 4px;
    }

    .card-cta {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 500;
      padding: 8px 18px;
      border-radius: 100px;
      transition: transform 0.2s ease, gap 0.2s ease;
    }
    .card-1 .card-cta { background: var(--bond); color: white; }
    .card-2 .card-cta { background: var(--coral); color: white; }
    .card:hover .card-cta { transform: scale(1.04); gap: 10px; }

    .arrow { font-size: 14px; transition: transform 0.2s; }
    .card:hover .arrow { transform: translateX(3px); }

    /* ── footer ── */
    .footer {
      margin-top: 52px;
      text-align: center;
      font-size: 12px; color: var(--muted);
      opacity: 0.6;
      animation: fadeUp 0.7s 0.4s ease both;
    }
    .footer span { color: var(--coral); }

    /* ── animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── responsive ── */
    @media (max-width: 600px) {
      .card { max-width: 100%; padding: 28px 22px 24px; }
      .main-title { font-size: 32px; }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <main class="page">

    <header class="header">
      <div class="brand-badge">
        <span class="paw">🐾</span>
        <span>BOND</span>
      </div>
      <h1 class="main-title">内容运营<em>工具箱</em></h1>
      <p class="subtitle">为 BOND 宠物社区量身定制的创作工具集</p>
    </header>

    <div class="cards">

      <!-- 工具 1：宠物活动排版 -->
      <a class="card card-1" href="pet-events.html">
        <div class="card-strip"></div>
        <div class="card-icon">🗓️</div>
        <div class="card-body">
          <span class="card-tag">活动资讯</span>
          <h2 class="card-title">宠物活动排版</h2>
          <p class="card-desc">每周活动资讯头图一键生成，快速整理活动信息并输出适配小红书的精美头图。</p>
        </div>
        <div class="card-footer">
          <span class="card-meta">🖼️ 图片导出</span>
          <span class="card-cta">进入工具 <span class="arrow">→</span></span>
        </div>
      </a>

      <!-- 工具 2：图文排版 -->
      <a class="card card-2" href="xhs-layout.html">
        <div class="card-strip"></div>
        <div class="card-icon">✏️</div>
        <div class="card-body">
          <span class="card-tag">图文创作</span>
          <h2 class="card-title">图文排版工具</h2>
          <p class="card-desc">小红书、公众号模块化排版，拖拽组合内容模块，同步导出 PNG 与公众号长文 HTML。</p>
        </div>
        <div class="card-footer">
          <span class="card-meta">📄 PNG · HTML 导出</span>
          <span class="card-cta">进入工具 <span class="arrow">→</span></span>
        </div>
      </a>

    </div>

    <footer class="footer">
      Made with <span>♥</span> for BOND · 宠物社区内容团队
    </footer>

  </main>

</body>
</html>
