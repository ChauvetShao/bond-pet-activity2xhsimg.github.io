<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书宠物活动排版工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --card-width: 420px;
            --card-ratio: calc(1660 / 1242);
            --bg-color: #FFFCEB;
            --primary-blue: #42aadf;
            --accent-orange: #E8A020;
            --text-gray: #999999;
            --table-border: #eee;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            flex-direction: row; /* 改变为左右布局 */
            height: 100vh;
            overflow: hidden;
        }

        /* 左侧：数据录入区 */
        .input-section {
            width: 55%; /* 增加工作区宽度以适应表格 */
            min-width: 600px;
            background: white;
            border-right: 2px solid #ddd;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 8px;
        }

        .toolbar-left { display: flex; align-items: center; gap: 8px; }
        .toolbar-right { display: flex; align-items: center; gap: 6px; }

        .cover-title-input {
            padding: 5px 10px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
            width: 140px;
            background: #fafafa;
            transition: border-color 0.15s, background 0.15s;
        }
        .cover-title-input:focus { outline: none; border-color: var(--primary-blue); background: white; }

        .btn-icon {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            background: white;
            color: #444;
            transition: background 0.15s, border-color 0.15s;
            white-space: nowrap;
        }
        .btn-icon:hover { background: #f5f5f5; border-color: #ccc; }

        .dropdown { position: relative; }
        .dropdown-menu {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            z-index: 200;
            min-width: 160px;
            padding: 4px 0;
        }
        .dropdown-menu.open { display: block; }
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            font-size: 13px;
            color: #333;
            cursor: pointer;
            transition: background 0.1s;
        }
        .dropdown-item:hover { background: #f5f5f5; }
        .dropdown-divider { height: 1px; background: #f0f0f0; margin: 4px 0; }

        .btn-ai-icon {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            background: var(--primary-blue);
            color: white;
            transition: opacity 0.15s;
        }
        .btn-ai-icon:hover { opacity: 0.88; }

        .btn-add-row {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 10px;
            border: 1px dashed #ccc;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            background: transparent;
            color: #888;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }
        .btn-add-row:hover { border-color: var(--primary-blue); color: var(--primary-blue); background: #f0f8ff; }

        .table-container {
            flex-grow: 1;
            overflow: auto;
            border: 1px solid var(--table-border);
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            table-layout: fixed;
        }

        th {
            background: #fafafa;
            position: sticky;
            top: 0;
            z-index: 10;
            text-align: left;
            padding: 10px;
            border-bottom: 2px solid var(--table-border);
            color: #666;
        }

        td {
            padding: 8px;
            border-bottom: 1px solid var(--table-border);
            vertical-align: top;
        }

        .col-index { width: 50px; }
        .col-title { width: 150px; }
        .col-organizer { width: 120px; }
        .col-date { width: 100px; }
        .col-location { width: 150px; }
        .col-desc { width: 200px; }
        .col-tags { width: 120px; }
        .col-cover { width: 120px; }
        .col-signup { width: 120px; }
        .col-actions { width: 60px; }

        .cell-editable {
            width: 100%;
            min-height: 30px;
            padding: 4px;
            border: 1px transparent solid;
            outline: none;
            word-break: break-all;
        }

        .cell-editable:hover {
            border-color: #ddd;
            background: #fdfdfd;
        }

        .cell-editable:focus {
            border-color: var(--primary-blue);
            background: white;
        }

        .cover-cell {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .cover-preview {
            width: 100%;
            height: 60px;
            background: #eee;
            border-radius: 4px;
            object-fit: cover;
            cursor: pointer;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn-add {
            background: #f0f0f0;
            color: #333;
        }

        .btn-add:hover { background: #e0e0e0; }

        .btn-ai {
            background: var(--primary-blue);
            color: white;
        }

        .btn-ai:hover { opacity: 0.9; }

        .btn-delete {
            color: #ff4d4f;
            background: transparent;
        }

        /* 表格行悬浮操作 */
        tr { position: relative; }
        tr:hover { background: #fafcff; }
        .row-actions {
            display: none;
            align-items: center;
            gap: 4px;
        }
        tr:hover .row-actions { display: flex; }
        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: transparent;
            color: #999;
            transition: background 0.1s, color 0.1s;
        }
        .action-btn:hover { background: #f0f0f0; color: #333; }
        .action-btn.delete:hover { background: #fff0f0; color: #ff4d4f; }

        /* 封面图缩略图 */
        .cover-cell {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .cover-thumb-wrap {
            position: relative;
            width: 100%;
            height: 56px;
            border-radius: 5px;
            overflow: hidden;
            background: #f0f0f0;
            cursor: pointer;
        }
        .cover-thumb-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .cover-thumb-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.15s;
            color: white;
            font-size: 11px;
            gap: 3px;
        }
        .cover-thumb-wrap:hover .cover-thumb-overlay { opacity: 1; }
        .cover-thumb-empty {
            width: 100%;
            height: 56px;
            border-radius: 5px;
            border: 1.5px dashed #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #bbb;
            font-size: 11px;
            gap: 4px;
            transition: border-color 0.15s, color 0.15s;
        }
        .cover-thumb-empty:hover { border-color: var(--primary-blue); color: var(--primary-blue); }

        /* AI 浮层 */
        .ai-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.95);
            z-index: 100;
            padding: 40px;
            flex-direction: column;
            align-items: center;
        }

        .ai-overlay.active { display: flex; }

        .ai-config {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
        }

        .ai-config input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .ai-textarea {
            width: 100%;
            max-width: 800px;
            height: 200px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            resize: none;
        }

        /* 下方：卡片预览区 */
        .preview-section {
            flex-grow: 1;
            background: #f0f0f0;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .preview-toolbar {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .btn-export {
            background: #333;
            color: white;
            padding: 10px 20px;
        }

        .cards-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding-bottom: 40px;
        }

        /* 卡片容器 */
        .card-container {
            /* background-image: url(/img/bg.png);
            background-size: cover;
            background-position: center; */
            background-repeat: no-repeat;
            width: var(--card-width);
            height: calc(var(--card-width) * var(--card-ratio));
            background-color: var(--bg-color);
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 40px;
            flex-shrink: 0;
        }

        /* 新增背景图样式 */
.card-bg-img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
    pointer-events: none;
}

/* 确保内容层级在背景之上 */
.card-container > *:not(.card-bg-img) {
    position: relative;
    z-index: 1;
}


        /* 封面卡片样式 */
        .card-cover {
            /* background-image: url(/img/cover-bg.png) !important; */
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .cover-title-text {
            margin-left: -60px;
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            text-align: center;
            line-height: 1.4;
            max-width: 90%;
            word-wrap: break-word;
            /* 可以加一点背景装饰或阴影 */
            padding: 2px 20px;
            background-color: #42aadf;
            border-radius: 9999px;
        }

        /* 结尾卡片样式 */
        .card-end {
            /* background-image: url(/img/last.png) !important; */
        }


        .activity-block-container{
            display: flex;
            flex-direction: row;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .activity-block {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1px;
            position: relative;
            padding: 10px 0;
        }

        .activity-no { color: var(--accent-orange); font-size: 10px; font-weight: bold; }
        .activity-title { font-size: 18px; font-weight: 700; color: #000; margin-bottom: 2px; }
        .activity-info { font-size: 12px; display: flex; align-items: center; gap: 4px; }
        .info-date { color: var(--primary-blue); }
        .info-location { color: #000; }
        .activity-desc { font-size: 12px; line-height: 1.8; color: #000; margin-top: 2px; }
        .activity-tags { font-size: 10px; color: var(--text-gray); margin-top: 0px; }
        .activity-signup { font-size: 8px; color: var(--primary-blue); margin-top: 0px; }

        .activity-cover {
            margin-top: 20px;
            width: 90px;
            height: 120px;
            background-color: #eee;
            border-radius: 4px;
            overflow: hidden;
            object-fit: cover;
        }

        /* 导出状态隐藏辅助线 */
        .activity-block-container:first-child {
            margin-top: 30px;
            margin-bottom: 20px;
            border-bottom: 1px dashed rgba(0,0,0,0.05);
        }

        .exporting .activity-block-container:first-child { border-bottom: none; }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.7);
            z-index: 1000;
            justify-content: center; align-items: center;
            font-weight: bold;
        }
        .loading-overlay.active { display: flex; }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">处理中...</div>

    <!-- 上方：数据录入区 -->
    <section class="input-section">
        <div class="header-toolbar">
            <div class="toolbar-left">
                <h2 style="font-size: 15px; font-weight: 600; color: #222; white-space: nowrap;">🐾 宠物活动</h2>
                <input type="text" id="coverTitleInput" class="cover-title-input" placeholder="封面标题..." oninput="renderCards()">
            </div>
            <div class="toolbar-right">
                <!-- 导入导出下拉 -->
                <div class="dropdown" id="importExportDropdown">
                    <button class="btn-icon" onclick="toggleDropdown('importExportDropdown')">
                        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 10v3.5A1.5 1.5 0 003.5 15h9a1.5 1.5 0 001.5-1.5V10M8 1v9M5 7l3 3 3-3"/></svg>
                        导入 / 导出
                        <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M2 3.5l3 3 3-3"/></svg>
                    </button>
                    <div class="dropdown-menu" id="importExportMenu">
                        <div class="dropdown-item" onclick="document.getElementById('excelUpload').click(); closeDropdowns()">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="1" width="12" height="14" rx="1.5"/><path d="M5 6l2 2-2 2M8 10h3"/></svg>
                            导入 Excel
                        </div>
                        <div class="dropdown-item" onclick="document.getElementById('zipUpload').click(); closeDropdowns()">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M13 6V13.5a1.5 1.5 0 01-1.5 1.5h-7A1.5 1.5 0 013 13.5V2.5A1.5 1.5 0 014.5 1H8"/><path d="M10 1v4h4"/><path d="M10 1l3 4"/></svg>
                            上传海报 ZIP
                        </div>
                        <div class="dropdown-divider"></div>
                        <div class="dropdown-item" onclick="exportToExcel(); closeDropdowns()">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8 1v9M5 7l3 3 3-3M2 13h12"/></svg>
                            导出 Excel
                        </div>
                    </div>
                </div>

                <!-- 添加活动 -->
                <button class="btn-add-row" onclick="addRow()">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 1v10M1 6h10"/></svg>
                    添加活动
                </button>

                <!-- AI 解析 -->
                <button class="btn-ai-icon" onclick="toggleAI()">
                    <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a1 1 0 011 1v1.07A5.5 5.5 0 0113.93 8H15a1 1 0 010 2h-1.07A5.5 5.5 0 018 13.93V15a1 1 0 01-2 0v-1.07A5.5 5.5 0 012.07 10H1a1 1 0 010-2h1.07A5.5 5.5 0 016 2.07V2a1 1 0 011-1zm0 3.5a3.5 3.5 0 100 7 3.5 3.5 0 000-7zM8 7a1 1 0 110 2 1 1 0 010-2z"/></svg>
                    AI 解析
                </button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="col-index">序号</th>
                        <th class="col-title">活动标题</th>
                        <th class="col-organizer">主办方</th>
                        <th class="col-date">日期</th>
                        <th class="col-location">地点</th>
                        <th class="col-desc">简介</th>
                        <th class="col-tags">标签/要求</th>
                        <th class="col-signup">报名方式</th>
                        <th class="col-cover">活动海报</th>
                        <th class="col-actions">操作</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <!-- 表格行将由 JS 生成 -->
                </tbody>
            </table>
        </div>

        <!-- AI 解析浮层 -->
        <div class="ai-overlay" id="aiOverlay">
            <h3 style="margin-bottom: 20px;">AI 批量解析</h3>
            <div class="ai-config">
                <input type="password" id="apiKey" placeholder="API Key">
                <input type="text" id="baseUrl" value="https://dashscope.aliyuncs.com/compatible-mode/v1" placeholder="Base URL">
                <input type="text" id="modelName" value="qwen-plus" placeholder="Model Name">
            </div>
            <textarea class="ai-textarea" id="aiRawText" placeholder="在此粘贴原始活动文本，例如：
1. 狗狗聚会，4月20日，朝阳公园...
2. 领养日，4月21日，通州北苑..."></textarea>
            <div style="display: flex; gap: 15px;">
                <button class="btn btn-ai" style="padding: 10px 30px;" onclick="analyzeText()">解析并填入表格</button>
                <button class="btn btn-add" style="padding: 10px 30px;" onclick="toggleAI()">取消</button>
            </div>
        </div>
    </section>

    <!-- 下方：卡片预览区 -->
    <section class="preview-section">
        <div class="preview-toolbar">
            <button class="btn-icon" onclick="copyAllText()">
                <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="5" y="4" width="8" height="10" rx="1.5"/><path d="M3 12V3a1 1 0 011-1h7"/></svg>
                复制文案
            </button>
            <button class="btn-icon" style="background:#222; color:white; border-color:#222;" onclick="exportAllPNG()">
                <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 10v3.5A1.5 1.5 0 003.5 15h9a1.5 1.5 0 001.5-1.5V10M8 1v9M5 7l3 3 3-3"/></svg>
                导出 PNG
            </button>
        </div>
        <div class="cards-grid" id="cardsGrid">
            <!-- 卡片预览将由 JS 生成 -->
        </div>
    </section>

    <!-- 隐藏的图片上传 input -->
    <input type="file" id="imageUpload" style="display: none;" accept="image/*">
    <input type="file" id="excelUpload" style="display: none;" accept=".xlsx, .xls" onchange="importFromExcel(this)">
    <input type="file" id="zipUpload" style="display: none;" accept=".zip" onchange="importFromZip(this)">

    <script>
        let activities = [];
        let currentUploadRowIndex = -1;
        let apiKeyVariable = ""; // API Key 只存变量

        // 初始化 6 行空数据
        function initData() {
            for (let i = 0; i < 6; i++) {
                activities.push(createEmptyActivity(i + 1));
            }
            renderTable();
            renderCards();
        }

        function createEmptyActivity(index) {
            return {
                index: index,
                title: "",
                organizer: "",
                date: "",
                location: "",
                description: "",
                tags: "",
                signupMethod: "小红书🔍",
                cover: ""
            };
        }

        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = activities.map((item, idx) => {
                const coverHtml = item.cover
                    ? `<div class="cover-thumb-wrap" onclick="triggerUpload(${idx})">
                            <img src="${item.cover}" alt="封面">
                            <div class="cover-thumb-overlay">
                                <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12l4-4 3 3 3-4 4 5H2z"/><circle cx="11" cy="5" r="2"/></svg>
                                更换
                            </div>
                       </div>`
                    : `<div class="cover-thumb-empty" onclick="triggerUpload(${idx})">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M2 11l4-4 3 3 2-2 3 3"/><circle cx="11" cy="6" r="1.5"/></svg>
                            上传图片
                       </div>`;

                return `<tr data-index="${idx}">
                    <td style="color:#bbb; font-size:12px; text-align:center;">${item.index}</td>
                    <td><div class="cell-editable" contenteditable="true" oninput="updateData(${idx}, 'title', this.innerText)">${item.title}</div></td>
                    <td><div class="cell-editable" contenteditable="true" oninput="updateData(${idx}, 'organizer', this.innerText)">${item.organizer}</div></td>
                    <td><div class="cell-editable" contenteditable="true" oninput="updateData(${idx}, 'date', this.innerText)">${item.date}</div></td>
                    <td><div class="cell-editable" contenteditable="true" oninput="updateData(${idx}, 'location', this.innerText)">${item.location}</div></td>
                    <td><div class="cell-editable" contenteditable="true" oninput="updateData(${idx}, 'description', this.innerText)">${item.description}</div></td>
                    <td><div class="cell-editable" contenteditable="true" oninput="updateData(${idx}, 'tags', this.innerText)">${item.tags}</div></td>
                    <td><div class="cell-editable" contenteditable="true" oninput="updateData(${idx}, 'signupMethod', this.innerText)">${item.signupMethod}</div></td>
                    <td><div class="cover-cell">${coverHtml}</div></td>
                    <td>
                        <div class="row-actions">
                            <button class="action-btn delete" onclick="deleteRow(${idx})" title="删除">
                                <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 5h10M6 5V3h4v2M6 8v5M10 8v5M4 5l1 8h6l1-8"/></svg>
                            </button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        // 更新数据并同步预览
        function updateData(idx, field, value) {
            activities[idx][field] = value;
            renderCards();
        }

        function addRow() {
            activities.push(createEmptyActivity(activities.length + 1));
            renderTable();
            renderCards();
        }

        function deleteRow(idx) {
            activities.splice(idx, 1);
            // 重新编号（可选）
            activities.forEach((item, i) => item.index = i + 1);
            renderTable();
            renderCards();
        }

        function triggerUpload(idx) {
            currentUploadRowIndex = idx;
            document.getElementById('imageUpload').click();
        }

        document.getElementById('imageUpload').onchange = function(e) {
            const file = e.target.files[0];
            if (file && currentUploadRowIndex !== -1) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    updateData(currentUploadRowIndex, 'cover', event.target.result);
                    renderTable();
                    // 解决相同文件无法重复上传的问题
                    e.target.value = '';
                };
                reader.readAsDataURL(file);
            }
        };

        function toggleAI() {
            document.getElementById('aiOverlay').classList.toggle('active');
        }

        // AI 解析逻辑
        async function analyzeText() {
            const apiKey = document.getElementById('apiKey').value;
            const baseUrl = document.getElementById('baseUrl').value;
            const model = document.getElementById('modelName').value;
            const text = document.getElementById('aiRawText').value;

            if (!apiKey) return alert('请输入 API Key');
            if (!text.trim()) return alert('请输入原始文本');

            apiKeyVariable = apiKey;
            const loadingOverlay = document.getElementById('loadingOverlay');
            loadingOverlay.classList.add('active');

            const systemPrompt = `你是一个专业的活动数据提取助手。请从用户提供的文本中提取宠物活动信息。
只返回 JSON 数组，不含任何其他解释性文字或 Markdown 代码块标识。
每项字段为：
{
  "index": 1,
  "title": "活动标题",
  "organizer": "主办方名称",
  "date": "日期（如 4月19日）",
  "location": "地点",
  "description": "活动简介，50-80字",
  "tags": "标签（如 #社交 #领养）",
  "signupMethod": "报名方式（如 小红书🔍）"
}`;

            try {
                const response = await fetch(`${baseUrl.replace(/\/$/, '')}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: text }
                        ],
                        temperature: 0.3
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error?.message || '请求失败');

                let content = data.choices[0].message.content.replace(/```json/g, '').replace(/```/g, '').trim();
                const newActivities = JSON.parse(content);
                
                // 填入表格（清空或追加，这里选择追加）
                activities = activities.filter(a => a.title || a.date); // 先清除纯空行
                newActivities.forEach(na => {
                    na.cover = na.cover || "";
                    activities.push(na);
                });
                
                renderTable();
                renderCards();
                toggleAI();
            } catch (error) {
                alert('解析失败：' + error.message);
            } finally {
                loadingOverlay.classList.remove('active');
            }
        }

        // 渲染预览卡片
        function renderCards() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            
            // 1. 添加封面卡片
            const coverCard = document.createElement('div');
            coverCard.className = 'card-container card-cover';
const coverBg = document.createElement('img');
coverBg.src = 'img/cover-bg.png';
coverBg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;pointer-events:none;';
coverCard.appendChild(coverBg);

            // 过滤掉完全没填内容的行
            const validData = activities.filter(a => a.title || a.date || a.location);
            
            // 2. 添加活动内容卡片
            for (let i = 0; i < validData.length; i += 2) {
                const card = document.createElement('div');
                card.className = 'card-container';

                // ✅ 用 img 标签替代 CSS background-image
                const bgImg = document.createElement('img');
                bgImg.className = 'card-bg-img';
                bgImg.src = '/img/bg.png';
                card.appendChild(bgImg);

                                

                card.appendChild(createActivityBlock(validData[i], 1));
                if (validData[i+1]) {
                    card.appendChild(createActivityBlock(validData[i+1], 2));
                }
                
                grid.appendChild(card);
            }

            // 3. 添加结尾卡片
const endCard = document.createElement('div');
endCard.className = 'card-container card-end';
const endBg = document.createElement('img');
endBg.src = 'img/last.png';
endBg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;pointer-events:none;';
endCard.appendChild(endBg);

        }

        function createActivityBlock(item, pos) {
            const container = document.createElement('div');
            container.className = 'activity-block-container';
            
            const coverHtml = item.cover ? `<img class="activity-cover" src="${item.cover}">` : `<div class="activity-cover" style="display: flex; align-items:center; justify-content:center; font-size:12px; color:#ccc;">暂无图片</div>`;

            const textHtml = `
                <div class="activity-block">
                    <div class="activity-no">NO.${item.index}</div>
                    <div class="activity-title">${item.title || '活动标题'}</div>
                    ${item.organizer ? `<div class="activity-organizer" style="font-size: 14px; color: #666; margin-bottom: 2px;">👤 ${item.organizer}</div>` : ''}
                    <div class="activity-info">
                        <span class="info-date">🕐 ${item.date || '日期'}</span>
                    </div>
                    <div class="activity-info">
                        <span class="info-location">📍 ${item.location || '地点'}</span>
                    </div>
                    <div class="activity-desc">${item.description || '活动简介...'}</div>
                    <div class="activity-tags">${item.tags || '#标签'}</div>
                    <div class="activity-signup">${item.signupMethod || '小红书🔍'}</div>
                </div>
            `;

            if (pos === 1) {
                container.innerHTML = coverHtml + textHtml;
            } else {
                container.innerHTML = textHtml + coverHtml;
            }
            
            return container;
        }

        function copyAllText() {
            const validData = activities.filter(a => a.title || a.date);
            const text = validData.map(item => 
                `NO.${item.index} 【${item.title}】\n${item.organizer ? `👤 主办方：${item.organizer}\n` : ''}🕐 ${item.date}\n📍 ${item.location}\nℹ️ ${item.description}\n# ${item.tags}\n${item.signupMethod}`
            ).join('\n\n');

            navigator.clipboard.writeText(text).then(() => alert('文案已复制到剪贴板'));
        }

        async function exportAllPNG() {
            const cards = document.querySelectorAll('.card-container');
            if (cards.length === 0) return alert('没有可导出的卡片');

            document.body.classList.add('exporting');
            const loadingOverlay = document.getElementById('loadingOverlay');
            loadingOverlay.classList.add('active');

            for (let i = 0; i < cards.length; i++) {
                try {
                    const canvas = await html2canvas(cards[i], {
                        scale: 16, // 提高到 4 倍以获得极高分辨率
                        useCORS: true,
                        backgroundColor: null,
                        imageTimeout: 0,
                        scale: 16,
                        logging: false,
                        onclone: (document) => {
                            // 可以在克隆的文档中进行一些微调
                        }
                    });
                    const link = document.createElement('a');
                    link.download = i === 0 ? `xhs-card-cover.png` : (i === cards.length - 1 ? `xhs-card-last.png` : `xhs-card-${i}.png`);
                    link.href = canvas.toDataURL('image/png', 1.0); // 使用最高质量
                    link.click();
                } catch (err) {
                    console.error('导出失败:', err);
                }
            }
            
            document.body.classList.remove('exporting');
            loadingOverlay.classList.remove('active');
        }

        // Excel 导出
        function exportToExcel() {
            const validData = activities.filter(a => a.title || a.date);
            if (validData.length === 0) return alert('没有可导出的数据');

            const excelData = validData.map(item => ({
                '序号': item.index,
                '活动标题': item.title,
                '主办方': item.organizer,
                '日期': item.date,
                '地点': item.location,
                '简介': item.description,
                '标签': item.tags,
                '报名方式': item.signupMethod,
                '海报数据(Base64)': item.cover // 导出海报图片信息
            }));

            const worksheet = XLSX.utils.json_to_sheet(excelData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "宠物活动");

            // 获取本周日期
            const now = new Date();
            const dateStr = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}`;
            
            XLSX.writeFile(workbook, `宠物活动-${dateStr}.xlsx`);
        }

        // Excel 导入
        function importFromExcel(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                // 使用 cellDates: true 自动处理 Excel 日期
                const workbook = XLSX.read(data, {type: 'array', cellDates: true});
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet, { defval: "" });

                if (jsonData.length === 0) return alert('Excel 文件中没有数据');

                // 字段映射
                const mapping = {
                    '序号': 'index',
                    '活动标题': 'title',
                    '主办方': 'organizer',
                    '日期': 'date',
                    '地点': 'location',
                    '简介': 'description',
                    '标签': 'tags',
                    '报名方式': 'signupMethod',
                    '海报数据(Base64)': 'cover' // 导入海报图片信息
                };

                const unmappedKeys = [];
                const firstRow = jsonData[0];
                Object.keys(mapping).forEach(key => {
                    if (!(key in firstRow) && key !== '海报数据(Base64)') unmappedKeys.push(key);
                });

                if (unmappedKeys.length > 0) {
                    alert(`警告：以下列未在 Excel 中识别：\n${unmappedKeys.join(', ')}\n这些字段将留空。`);
                }

                activities = jsonData.map((row, idx) => {
                    const activity = createEmptyActivity(idx + 1);
                    Object.entries(mapping).forEach(([excelKey, dataKey]) => {
                        let val = row[excelKey];
                        // 处理日期对象转为字符串
                        if (val instanceof Date) {
                            val = `${val.getMonth() + 1}月${val.getDate()}日`;
                        }
                        if (val !== undefined) {
                            activity[dataKey] = val;
                        }
                    });
                    return activity;
                });

                renderTable();
                renderCards();
                input.value = ""; // 清空 input
            };
            reader.readAsArrayBuffer(file);
        }

        // ZIP 导入逻辑
        async function importFromZip(input) {
            const file = input.files[0];
            if (!file) return;

            const loadingOverlay = document.getElementById('loadingOverlay');
            loadingOverlay.classList.add('active');
            loadingOverlay.innerText = "正在解压并匹配海报...";

            try {
                const zip = new JSZip();
                const contents = await zip.loadAsync(file);
                const imagePromises = [];
                const imageMap = new Map(); // 文件名 -> base64

                // 遍历压缩包内的文件
                for (const filename in contents.files) {
                    const zipEntry = contents.files[filename];
                    // 忽略文件夹和非图片文件
                    if (!zipEntry.dir && /\.(png|jpe?g|webp|gif)$/i.test(filename)) {
                        const promise = zipEntry.async("base64").then(base64 => {
                            // 获取不带扩展名和路径的文件名
                            const pureName = filename.split('/').pop().replace(/\.[^/.]+$/, "").trim().toLowerCase();
                            imageMap.set(pureName, `data:image/${filename.split('.').pop()};base64,${base64}`);
                        });
                        imagePromises.push(promise);
                    }
                }

                await Promise.all(imagePromises);

                let matchCount = 0;
                // 开始匹配表格中的活动标题
                activities.forEach((activity, idx) => {
                    if (activity.title) {
                        const cleanTitle = activity.title.trim().toLowerCase();
                        if (imageMap.has(cleanTitle)) {
                            activity.cover = imageMap.get(cleanTitle);
                            matchCount++;
                        }
                    }
                });

                if (matchCount > 0) {
                    renderTable();
                    renderCards();
                    alert(`成功匹配并自动上传了 ${matchCount} 张海报！`);
                } else {
                    alert('未在压缩包中找到与活动标题匹配的海报文件。请确保文件名与表格中的「活动标题」一致。');
                }

            } catch (err) {
                console.error('ZIP 解析失败:', err);
                alert('压缩包解析失败，请确保文件是有效的 .zip 格式。');
            } finally {
                loadingOverlay.classList.remove('active');
                loadingOverlay.innerText = "处理中...";
                input.value = ""; // 清空 input
            }
        }

        // 下拉菜单控制
        function toggleDropdown(id) {
            const menu = document.getElementById(id).querySelector('.dropdown-menu');
            const isOpen = menu.classList.contains('open');
            closeDropdowns();
            if (!isOpen) menu.classList.add('open');
        }
        function closeDropdowns() {
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
        }
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.dropdown')) closeDropdowns();
        });

        // 启动
        initData();
    </script>
